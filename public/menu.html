<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillforge Bot Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #001a4d 0%, #FF8C00 50%, #FFD700 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
        }

        .menu-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .button-group.full {
            grid-template-columns: 1fr;
        }

        .menu-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #001a4d 0%, #FF8C00 100%);
            color: white;
            border: 2px solid #FFD700;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0a2d7f 0%, #FF9500 100%);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #001a4d;
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        .btn-success:hover {
            background: #0a2d7f;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }

        .btn-info {
            background: #FF8C00;
            color: white;
            border: 1px solid #FFD700;
        }

        .btn-info:hover {
            background: #FF9500;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 30px;
        }

        body:not(.is-staff) .staff-only {
            display: none;
        }

        body.is-staff .public-only {
            display: none;
        }

        .emoji {
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 24px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎓</div>
            <div class="title">Skillforge Bot</div>
            <div class="subtitle">Classroom Management System</div>
        </div>

        <div class="menu-section public-only">
            <div class="section-title">👤 Trainee / Public</div>
            <div class="button-group full">
                <button type="button" class="menu-btn btn-primary" data-action="menu">
                    <span class="emoji">▶️</span> Open Bot Menu
                </button>
            </div>
            <div class="button-group">
                <button type="button" class="menu-btn btn-success" data-action="verify">
                    <span class="emoji">✅</span> Verify
                </button>
                <button type="button" class="menu-btn btn-secondary" data-action="help">
                    <span class="emoji">❓</span> Help
                </button>
            </div>
            <div class="button-group full">
                <button type="button" class="menu-btn btn-info" data-action="register">
                    <span class="emoji">📝</span> Register as Staff
                </button>
            </div>
        </div>

        <div class="divider public-only"></div>

        <!-- Specialist Menu -->
        <div class="menu-section staff-only">
            <div class="section-title">📋 Specialist Dashboard</div>
            <div class="button-group full">
                <button type="button" class="menu-btn btn-primary" data-action="menu">
                    <span class="emoji">▶️</span> Start/Menu
                </button>
            </div>
            <div class="button-group">
                <button type="button" class="menu-btn btn-success" data-action="register">
                    <span class="emoji">📝</span> Register
                </button>
                <button type="button" class="menu-btn btn-success" data-action="claim">
                    <span class="emoji">🏢</span> Claim Group
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="menu-section staff-only">
            <div class="section-title">📅 Classroom Operations</div>
            <div class="button-group">
                <button type="button" class="menu-btn btn-info" data-action="schedule">
                    <span class="emoji">⏰</span> Schedule Class
                </button>
                <button type="button" class="menu-btn btn-info" data-action="classes">
                    <span class="emoji">📚</span> View Classes
                </button>
            </div>
            <div class="button-group">
                <button type="button" class="menu-btn btn-secondary" data-action="report">
                    <span class="emoji">📊</span> Reports
                </button>
                <button type="button" class="menu-btn btn-secondary" data-action="progress">
                    <span class="emoji">📈</span> Progress
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="menu-section staff-only">
            <div class="section-title">🎯 Weekly Review</div>
            <div class="button-group full">
                <button type="button" class="menu-btn btn-primary" data-action="weekly">
                    <span class="emoji">📝</span> Submit Weekly Report (Saturday)
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="menu-section staff-only">
            <div class="section-title">⚙️ Account</div>
            <div class="button-group">
                <button type="button" class="menu-btn btn-secondary" data-action="settings">
                    <span class="emoji">⚙️</span> Settings
                </button>
                <button type="button" class="menu-btn btn-secondary" data-action="help">
                    <span class="emoji">❓</span> Help
                </button>
            </div>
        </div>

        <div class="footer">
            <p>🚀 Powered by Skillforge Digital</p>
            <p style="margin-top: 8px; font-size: 11px;">Tap any button to interact with the bot →</p>
        </div>
    </div>
    <script>
        (function () {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (tg) {
                try { tg.ready(); } catch (e) {}
            }

            async function loadRole() {
                if (!tg || !tg.initData) return { ok: true, role: 'public' };
                const res = await fetch('/api/webapp/role', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                return await res.json();
            }

            function sendAction(action) {
                if (!tg) return;
                tg.sendData(JSON.stringify({ action }));
                tg.close();
            }

            document.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                e.preventDefault();
                const action = btn.getAttribute('data-action');
                sendAction(action);
            });

            loadRole().then((r) => {
                if (r && r.ok && r.role === 'specialist') {
                    document.body.classList.add('is-staff');
                }
            }).catch(() => {});
        })();
    </script>
</body>
</html>
